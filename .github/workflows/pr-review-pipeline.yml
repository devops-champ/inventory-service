name: PR Review Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setversion:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Read and Bump Version
        id: bump
        run: |
          VERSION=$(mvn help:evaluate \
            -Dexpression=project.version \
            -q \
            -DforceStdout)

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          mvn versions:set \
            -DnewVersion=${NEW_VERSION} \
            -DgenerateBackupPoms=false

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload Updated Pom
        uses: actions/upload-artifact@v5
        with:
          name: updated-pom
          path: pom.xml

  build:
    runs-on: ubuntu-latest
    needs: setversion

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean verify

      - name: Upload Jar
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar

  sonar:
    runs-on: ubuntu-latest
    needs:
      - setversion
      - build

    steps:
      - uses: actions/checkout@v5

      - name: Download Updated Pom
        uses: actions/download-artifact@v5
        with:
          name: updated-pom

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Analyze with SonarQube (Manual PR Parameters)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }} \
            -Dsonar.organization=devops-champ \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=$GITHUB_HEAD_REF \
            -Dsonar.pullrequest.base=$GITHUB_BASE_REF \
            -Dsonar.token=$SONAR_TOKEN

  docker:
    runs-on: ubuntu-latest
    needs:
      - setversion
      - build
      - sonar

    env:
      VERSION: ${{ needs.setversion.outputs.new_version }}

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker Image
        run: |
          IMAGE=${{ github.event.repository.name }}

          docker build \
            -t $IMAGE:${VERSION} \
            -t $IMAGE:pr .

      - name: Verify Docker Images
        run: docker images
